services:
  anchor-mcp:
    build: /srv/mergerfs/warehouse/casmas-bridge/anchor-mcp
    container_name: anchor-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - /srv/mergerfs/warehouse/anchor-mcp/.env
    environment:
      - WAREHOUSE=/warehouse
      - WAREHOUSE_HOST=/srv/mergerfs/warehouse
    volumes:
      - /srv/mergerfs/warehouse/casmas-bridge:/repo/casmas-bridge
      - /srv/mergerfs/warehouse:/warehouse
      - /root/.ssh/deploy_key:/root/.ssh/deploy_key:ro
      - /var/run/docker.sock:/var/run/docker.sock
