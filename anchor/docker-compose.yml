services:
  anchor:
    build: /srv/mergerfs/warehouse/anchor
    container_name: anchor
    restart: unless-stopped
    network_mode: host
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ANCHOR_URL=http://localhost:7778
      - API_SPEND_LIMIT=40
      - TZ=America/New_York
      - USE_OLLAMA=${USE_OLLAMA:-false}
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.50.50:11434}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - ALERT_EMAIL2=${ALERT_EMAIL2:-}
    volumes:
      - /srv/mergerfs/warehouse/anchor/data:/data
      - /srv/mergerfs/warehouse/casmas-bridge:/bridge
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /srv/mergerfs/warehouse/anchor:/anchordeploy
