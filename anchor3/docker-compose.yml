services:
  anchor3:
    build: .
    container_name: anchor3
    restart: unless-stopped
    ports:
      - "1234:7779"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=America/New_York
      - USE_OLLAMA=${USE_OLLAMA:-true}
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.50.50:11434}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - ALERT_EMAIL2=${ALERT_EMAIL2:-}
      - IMAP_HOST=${IMAP_HOST:-mail.privateemail.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - ANCHOR_INBOUND=${ANCHOR_INBOUND:-anchor@thecasmas.com}
      - TEMPEST_TOKEN=${TEMPEST_TOKEN:-}
    volumes:
      - /srv/mergerfs/warehouse/anchor3/data:/data
      - /srv/mergerfs/warehouse/anchor3/attachments:/attachments
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
